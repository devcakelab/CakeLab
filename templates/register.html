{% extends "base.html" %}

{% set page_title = "Register - CakeLab" %}
{% set show_nav = false %}

{% block content %}
<div class="card auth-shell">
    <h1>Create Account</h1>
    <p>Create a user account for POS access and performance tracking.</p>
    <form method="post" action="{{ url_for('register_submit') }}">
        <label for="full_name">Full Name</label>
        <input id="full_name" name="full_name" required>

        <label for="username">Username</label>
        <input id="username" name="username" required>

        <label for="password">Password</label>
        <input id="password" type="password" name="password" required>

        <label for="confirm_password">Confirm Password</label>
        <input id="confirm_password" type="password" name="confirm_password" required>

        <button type="submit">Register</button>
    </form>
    <p>Already registered? <a href="{{ url_for('login') }}">Back to login</a>.</p>
</div>
{% endblock %}
