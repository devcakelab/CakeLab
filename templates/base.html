    <!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <style>
        :root {
            --bg: #f1f4fb;
            --card: #ffffff;
            --text: #16243a;
            --muted: #5f6d81;
            --border: #d9e1ef;
            --primary: #3866f2;
            --primary-dark: #274cc4;
            --primary-soft: #edf2ff;
            --accent: #7c3aed;
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: "Segoe UI", Tahoma, Arial, sans-serif;
            margin: 0;
            padding: 24px;
            background:
                radial-gradient(circle at 0% 0%, #eef3ff 0%, transparent 45%),
                radial-gradient(circle at 100% 0%, #f0edff 0%, transparent 38%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        h1, h2 {
            margin: 0 0 10px 0;
            line-height: 1.2;
            color: #10213a;
        }
        h1 {
            font-size: 34px;
            font-weight: 800;
        }
        h2 {
            font-size: 22px;
            font-weight: 700;
        }
        p {
            margin: 0 0 14px 0;
            color: var(--muted);
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin: 0 auto 18px;
            max-width: 1400px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(6px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 14px;
            box-shadow: 0 8px 20px rgba(18, 35, 74, 0.08);
        }
        .nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .nav a {
            text-decoration: none;
            color: var(--primary);
            border: 1px solid #c9d7ff;
            background: linear-gradient(180deg, #f8faff 0%, var(--primary-soft) 100%);
            padding: 8px 13px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.15s ease;
        }
        .nav a:hover {
            transform: translateY(-1px);
            border-color: #a8bcff;
        }
        .nav a.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 6px 14px rgba(56, 102, 242, 0.3);
        }
        .warning {
            background: #fff8e6;
            color: #7a5600;
            border: 1px solid #edd28b;
        }
        .info {
            background: #ecf4ff;
            color: #174a8b;
            border: 1px solid #b7d2f8;
        }
        .inline {
            display: inline-block;
            margin: 0;
        }
        .inline button {
            width: auto;
            margin-bottom: 0;
            padding: 6px 10px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            margin: 0 auto 18px;
            max-width: 1400px;
            box-shadow: 0 8px 20px rgba(17, 35, 76, 0.08);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        th, td {
            border: 1px solid #e5ebf6;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }
        th {
            background: #f5f8ff;
            color: #30405f;
        }
        label {
            display: block;
            margin-top: 8px;
            margin-bottom: 6px;
            font-weight: 700;
            font-size: 13px;
            color: #30405f;
        }
        input, select, button {
            width: 100%;
            padding: 10px 11px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #ccd6e8;
            font-size: 14px;
            background: #fff;
            color: #1e2b43;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #8fa6ff;
            box-shadow: 0 0 0 3px rgba(56, 102, 242, 0.15);
        }
        button {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 14px rgba(65, 88, 208, 0.24);
        }
        .message {
            padding: 12px 13px;
            border-radius: 12px;
            margin: 0 auto 18px;
            max-width: 1400px;
            font-size: 14px;
            border: 1px solid transparent;
        }
        .success {
            background: #e8f8ee;
            color: #1f6b3b;
            border-color: #b7e3c9;
        }
        .error {
            background: #ffecec;
            color: #8a1f2d;
            border-color: #f0b8c0;
        }
        .summary {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .pill {
            background: linear-gradient(180deg, #ffffff 0%, #f8faff 100%);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 9px 14px;
            font-size: 14px;
            box-shadow: inset 0 1px 0 #fff;
        }
        .page {
            max-width: 1400px;
            margin: 0 auto;
        }
        body.login-page {
            background:
                radial-gradient(circle at 0% 0%, #eef3ff 0%, transparent 45%),
                radial-gradient(circle at 100% 0%, #f0edff 0%, transparent 38%),
                var(--bg);
            padding: 38px;
        }
        .bakery-shell {
            max-width: 1320px;
            margin: 0 auto;
        }
        .bakery-card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 24px 30px 20px;
            box-shadow: 0 12px 26px rgba(17, 35, 76, 0.08);
        }
        .bakery-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .bakery-nav .brand {
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 1px;
            font-size: 14px;
            text-transform: uppercase;
        }
        .bakery-nav nav {
            display: flex;
            gap: 18px;
            align-items: center;
            flex-wrap: wrap;
        }
        .bakery-nav nav a {
            text-decoration: none;
            color: #5f6d81;
            font-size: 13px;
            font-weight: 600;
            border: none;
            background: transparent;
            padding: 4px 8px;
            border-radius: 999px;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .bakery-nav nav a:hover {
            background: #edf2ff;
            color: var(--primary);
        }
        .bakery-nav nav a.active {
            color: #ffffff;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
        }
        .bakery-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            align-items: center;
        }
        .bakery-copy h1 {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 70px;
            line-height: 0.95;
            color: #10213a;
            margin: 14px 0 12px;
            font-weight: 500;
        }
        .bakery-copy p {
            color: var(--muted);
            max-width: 360px;
            margin-bottom: 18px;
            font-size: 13px;
            line-height: 1.5;
        }
        .bakery-copy .cta {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: #ffffff;
            border: 1px solid transparent;
            font-weight: 600;
            padding: 10px 22px;
            border-radius: 999px;
            margin: 4px 0 18px;
        }
        .login-form {
            margin-top: 6px;
            max-width: 330px;
        }
        .login-form label {
            color: #30405f;
            font-size: 12px;
            margin-top: 7px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .login-form input {
            border-radius: 999px;
            border: 1px solid #ccd6e8;
            padding: 10px 14px;
            margin-bottom: 10px;
            background: #ffffff;
        }
        .login-form input:focus {
            border-color: #8fa6ff;
            box-shadow: 0 0 0 3px rgba(56, 102, 242, 0.15);
        }
        .login-form button {
            border-radius: 999px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            margin-top: 6px;
        }
        .login-form button:hover {
            box-shadow: 0 10px 18px rgba(65, 88, 208, 0.25);
        }
        .bakery-copy .meta {
            margin-top: 8px;
            font-size: 12px;
            color: var(--muted);
        }
        .bakery-visual {
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bakery-visual .brand-logo-image {
            width: min(100%, 500px);
            max-height: 240px;
            object-fit: contain;
            filter: none;
            mix-blend-mode: normal;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(17, 25, 46, 0.18);
        }
        @media (max-width: 900px) {
            body { padding: 14px; }
            .grid {
                grid-template-columns: 1fr;
            }
            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }
            body.login-page {
                padding: 18px 12px;
            }
            .bakery-card {
                padding: 18px 16px;
            }
            .bakery-content {
                grid-template-columns: 1fr;
            }
            .bakery-nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .bakery-nav nav {
                gap: 14px;
            }
            .bakery-copy h1 {
                font-size: 50px;
            }
            .bakery-visual {
                text-align: center;
            }
            .bakery-visual .brand-logo-image {
                width: min(100%, 320px);
                max-height: 180px;
            }
        }
    </style>
</head>
<body class="{{ body_class|default('') }}">
    {% if show_nav %}
    <div class="topbar">
        <div class="nav">
            <a href="{{ url_for('dashboard_page') }}" class="{{ 'active' if active_page == 'dashboard' else '' }}">Dashboard</a>
            <a href="{{ url_for('pos_page') }}" class="{{ 'active' if active_page == 'pos' else '' }}">POS</a>
            <a href="{{ url_for('inventory_page') }}" class="{{ 'active' if active_page == 'inventory' else '' }}">Inventory</a>
            <a href="{{ url_for('sales_page') }}" class="{{ 'active' if active_page == 'sales' else '' }}">Sales Tracker</a>
        </div>
        <div>
            Logged in as <strong>{{ full_name }}</strong> |
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </div>
    {% endif %}

    {% if message %}
        <div class="message {{ status if status in ['success', 'error', 'warning', 'info'] else 'info' }}">
            {{ message }}
        </div>
    {% endif %}

    <main class="page">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
